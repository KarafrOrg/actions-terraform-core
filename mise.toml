[tasks.tag-release]
description = "Tag a release with all version aliases (e.g. v1, v1.0, v1.0.0)"
run = """
#!/usr/bin/env bash
set -euo pipefail

VERSION="${1:-}"

if [[ -z "$VERSION" ]]; then
  echo "Usage: mise run tag-release <version>"
  echo "Example: mise run tag-release 1.0.0"
  exit 1
fi

# Strip leading 'v' if provided
VERSION="${VERSION#v}"

# Validate semver format
if ! [[ "$VERSION" =~ ^[0-9]+\\.[0-9]+\\.[0-9]+$ ]]; then
  echo "Error: version must be in format X.Y.Z (e.g. 1.0.0)"
  exit 1
fi

MAJOR=$(echo "$VERSION" | cut -d. -f1)
MINOR=$(echo "$VERSION" | cut -d. -f2)

TAG_PATCH="v${VERSION}"
TAG_MINOR="v${MAJOR}.${MINOR}"
TAG_MAJOR="v${MAJOR}"

echo "  $TAG_MAJOR"
echo "  $TAG_MINOR"
echo "  $TAG_PATCH"

git tag "$TAG_MAJOR" --force
git tag "$TAG_MINOR" --force
git tag "$TAG_PATCH" --force

echo ""
echo "Pushing tags to origin..."
git push origin "$TAG_MAJOR" "$TAG_MINOR" "$TAG_PATCH" --force

echo ""
echo "Done. Tags pushed successfully."
"""
